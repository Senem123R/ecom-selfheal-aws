AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: E-Commerce Self-Healing DevOps Platform

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        REGION: us-east-1

Resources:

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: services/auth/
      Handler: main.lambda_handler
      FunctionName: ecom-auth-service
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecom-users
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/{proxy+}
            Method: any

  PaymentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: services/payments/
      Handler: main.lambda_handler
      FunctionName: ecom-payments-service
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecom-payments
      Events:
        Api:
          Type: Api
          Properties:
            Path: /payments/{proxy+}
            Method: any

  ObserveFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: observe/
      Handler: main.lambda_handler
      FunctionName: ecom-observe
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ecom-incidents
        - SNSPublishMessagePolicy:
            TopicName: ecom-incidents
        - Statement:
            - Effect: Allow
              Action:
                - logs:FilterLogEvents
                - logs:DescribeLogGroups
                - logs:GetLogEvents
              Resource: '*'
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)

  AnalyzeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: analyze/
      Handler: main.lambda_handler
      FunctionName: ecom-analyze
      Timeout: 120
      Environment:
        Variables:
          OPENROUTER_KEY: REPLACE_WITH_YOUR_KEY
      Policies:
        - SNSPublishMessagePolicy:
            TopicName: ecom-incidents
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic: !Ref IncidentTopic

  IncidentTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ecom-incidents

  IncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-incidents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH

  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ecom-payments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: txn_id
          AttributeType: S
      KeySchema:
        - AttributeName: txn_id
          KeyType: HASH